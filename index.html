<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibrant Kepler</title>
    <meta name="description" content="Увлекательная игра про алхимию и создание мира. Открывайте новые элементы и создавайте свою уникальную экосистему!">
    <script defer src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap"></noscript>
  </head>
  <body>
    <div id="app">
      <header id="top-bar">
        <button class="icon-btn" title="Главная">🏠</button>
        <div class="search-container">
          <input type="text" id="search-input" placeholder="Поиск элементов..." autocomplete="off" />
          <button id="search-clear-btn" class="search-clear-btn" title="Очистить поиск">✖</button>
        </div>
        <div class="stats">
          <div class="stat"><span>Elements:</span><strong id="elements-count">0 / 0</strong></div>
          <div class="stat"><span>Reactions:</span><strong id="reactions-count">0 / 0</strong></div>
        </div>
        <button class="icon-btn" id="encyclopedia-btn" title="Книга открытий">📖</button>
      </header>
      
      <main id="main-area">
        <div id="inventory" class="inventory left"></div>
        <div id="crafting-station" class="crafting-station">
          <div class="crafting-inputs">
            <div class="craft-slot" data-index="0"></div>
            <div class="craft-slot" data-index="1"></div>
            <div class="craft-slot" data-index="2"></div>
          </div>
          <div class="crafting-equals">
            <span>=</span>
            <button id="clear-slots-btn" title="Очистить слоты">🗑️</button>
          </div>
          <div class="crafting-output" id="crafting-output">
            <!-- Сюда будут добавляться result-slot -->
          </div>
        </div>
        <div id="inventory-right" class="inventory right"></div>
      </main>

      <footer id="bottom-bar">
        <button class="icon-btn" id="help-btn" title="Помощь">❓</button>
        <button class="icon-btn" id="hint-btn" title="Случайная подсказка">💡</button>
        <button class="icon-btn" id="clear-btn" title="Очистить доску">🗑️</button>
        <button class="icon-btn">🌍</button>
      </footer>
    </div>
    
    <div id="toast-container"></div>
    
    <!-- Энциклопедия (Модальное окно) -->
    <div id="encyclopedia-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Книга открытий</h2>
          <button id="close-encyclopedia" class="close-btn">✖</button>
        </div>
        <div class="modal-body" id="encyclopedia-list">
          <!-- Сюда скриптом будут добавляться открытые элементы -->
        </div>
      </div>
    </div>
    
    <script type="module" src="/main.js"></script>
  </body>
</html>
