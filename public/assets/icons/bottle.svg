<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Glass gradient -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#bfdbfe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.15)" />
    </filter>
  </defs>
  
  <g filter="url(#drop-shadow)">
    <!-- Water inside -->
    <path d="M 30 50 L 30 85 C 30 90, 35 95, 50 95 C 65 95, 70 90, 70 85 L 70 50 Z" fill="#3b82f6" opacity="0.8"/>
    
    <!-- Bottle outline -->
    <path d="M 40 10 L 60 10 C 62 10, 63 12, 63 15 L 63 30 C 63 35, 70 40, 70 45 L 70 85 C 70 93, 63 95, 50 95 C 37 95, 30 93, 30 85 L 30 45 C 30 40, 37 35, 37 30 L 37 15 C 37 12, 38 10, 40 10 Z" 
          fill="url(#glassGradient)" stroke="#60a5fa" stroke-width="2"/>
          
    <!-- Bottle neck detail -->
    <rect x="36" y="20" width="28" height="4" fill="#60a5fa" opacity="0.5" rx="2"/>
    
    <!-- Highlight -->
    <path d="M 35 45 L 35 85" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 40 15 L 40 28" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
    
    <!-- Cork -->
    <path d="M 42 5 L 58 5 C 60 5, 60 7, 60 10 L 40 10 C 40 7, 40 5, 42 5 Z" fill="#d97706"/>
  </g>
</svg>
