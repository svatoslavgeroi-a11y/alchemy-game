<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Soft 3D lighting gradient -->
    <radialGradient id="clayGradient" cx="35%" cy="30%" r="70%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </radialGradient>
    <!-- Highlight -->
    <radialGradient id="highlight" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.15)" />
    </filter>
  </defs>
  
  <g filter="url(#drop-shadow)">
    <!-- Main cap body -->
    <path d="M 15 65 
             C 15 15, 85 15, 85 65 
             C 85 70, 80 75, 50 75 
             C 20 75, 15 70, 15 65 Z" 
          fill="url(#clayGradient)" />
          
    <!-- Rim / edge at the bottom -->
    <path d="M 15 65 C 20 62, 80 62, 85 65 C 80 68, 20 68, 15 65 Z" 
          fill="#1e40af" />
          
    <!-- Glossy highlight to make it look like rubber/silicone -->
    <path d="M 15 65 
             C 15 15, 85 15, 85 65 
             C 85 70, 80 75, 50 75 
             C 20 75, 15 70, 15 65 Z" 
          fill="url(#highlight)" />
          
    <!-- Side fold/crease for realism -->
    <path d="M 25 50 Q 30 65 25 70" stroke="#1e40af" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5" />
  </g>
</svg>
